name: Build mobile apps

# Validates that the Android and iOS native projects still build on every
# push, without needing a local Mac (iOS) or Android Studio. These are
# unsigned debug/simulator builds for CI verification only — a real
# App Store / Play Store release still needs your own signing
# certificates and developer accounts wired in separately.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Android (debug APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets into native projects
        run: npm run sync-web && npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: asteroid-typer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    name: iOS (simulator build)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets into native projects
        run: npm run sync-web && npx cap sync ios

      - name: Build for iOS Simulator (unsigned)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
