<style>
  :root {
    --bg: #05070f;
    --panel: rgba(10, 16, 32, 0.85);
    --accent: #4fd8ff;
    --accent2: #ff5fd8;
    --easy: #57ffb0;
    --medium: #ffd35c;
    --hard: #ff5c5c;
    --premium: #c04dff;
    --danger: #ff3b3b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Segoe UI', 'Courier New', monospace;
    color: #eaf6ff;
    overflow: hidden;
    user-select: none;
  }
  #starfield {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  #app {
    position: relative; z-index: 1; width: 100%; height: 100%;
  }

  /* ---------- Screens (start / gameover) ---------- */
  .screen {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 22px; text-align: center; padding: 20px;
  }
  .hidden { display: none !important; }

  .panel {
    background: var(--panel);
    border: 1px solid rgba(79, 216, 255, 0.35);
    border-radius: 18px;
    padding: 32px 40px;
    box-shadow: 0 0 40px rgba(79, 216, 255, 0.15), inset 0 0 60px rgba(79,216,255,0.03);
    max-width: 720px;
    width: 90%;
    max-height: 88vh;
    overflow-y: auto;
  }

  h1.title {
    font-size: clamp(28px, 5vw, 46px);
    margin: 0;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 12px var(--accent), 0 0 30px rgba(79,216,255,0.5);
  }
  .subtitle {
    color: #9fb6cc;
    font-size: 15px;
    margin-top: 6px;
    line-height: 1.5;
  }

  .pack-section-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #8fa6bc;
    margin: 18px 0 8px; text-align: left; display: flex; align-items: center; gap: 6px;
  }
  .pack-section-title .premium-flag { color: var(--premium); font-size: 13px; }
  .pack-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 10px;
  }
  .pack-tile {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 12px 6px; border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
    color: #eaf6ff; font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    cursor: pointer; transition: all 0.15s ease;
  }
  .pack-tile:hover { transform: translateY(-2px); border-color: var(--accent); }
  .pack-tile .pack-icon { font-size: 26px; }
  .pack-tile.selected {
    border-color: var(--accent); background: rgba(79,216,255,0.15);
    box-shadow: 0 0 16px rgba(79,216,255,0.4);
  }
  .pack-tile.locked { opacity: 0.55; border-color: var(--premium); }
  .pack-tile.locked:hover { transform: none; }
  .pack-lock-badge { position: absolute; top: 4px; right: 6px; font-size: 13px; }

  #lockToast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--premium);
    padding: 12px 22px; border-radius: 10px; font-size: 14px; color: #fff;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
    z-index: 50; max-width: 90vw; text-align: center; box-shadow: 0 0 20px rgba(192,77,255,0.3);
  }
  #lockToast.show { opacity: 1; }

  .big-btn {
    margin-top: 10px;
    padding: 16px 46px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #04101c;
    box-shadow: 0 0 25px rgba(79,216,255,0.5);
    transition: transform 0.12s ease;
  }
  .big-btn:hover { transform: scale(1.05); }
  .big-btn:active { transform: scale(0.97); }

  .stats-final {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px 28px; margin: 14px 0;
    font-size: 15px; text-align: left;
  }
  .stats-final .val { color: var(--accent); font-weight: 700; font-size: 20px; display: block; }
  .stats-final .lbl { color: #9fb6cc; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

  /* ---------- Game field ---------- */
  #gameField {
    position: absolute; inset: 0; z-index: 1;
  }

  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start;
    padding: 12px clamp(10px, 3vw, 24px); gap: 8px; pointer-events: none;
    font-size: 14px;
  }
  .hud-block {
    background: var(--panel); border: 1px solid rgba(79,216,255,0.25);
    border-radius: 10px; padding: 6px clamp(8px, 2.5vw, 16px);
    display: flex; gap: clamp(8px, 2.5vw, 18px);
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
  }
  .hud-item { text-align: center; min-width: 38px; }
  .hud-item .num { display: block; font-size: clamp(14px, 3.5vw, 18px); font-weight: 700; color: var(--accent); }
  .hud-item .lab { font-size: 9px; color: #8fa6bc; letter-spacing: 1px; }
  #combo-display {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    font-size: 22px; font-weight: 800; color: var(--accent2);
    text-shadow: 0 0 14px var(--accent2);
    opacity: 0; transition: opacity 0.15s ease;
    z-index: 6; pointer-events: none;
  }
  #combo-display.show { opacity: 1; }

  #lives {
    display: flex; gap: 6px;
  }
  .life-icon { font-size: 20px; filter: drop-shadow(0 0 6px var(--danger)); }
  .life-icon.lost { opacity: 0.15; filter: none; }

  .asteroid {
    position: absolute;
    padding: 8px 16px;
    border-radius: 14px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), rgba(20,26,46,0.9));
    border: 2px solid rgba(255,255,255,0.25);
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 1px;
    white-space: nowrap;
    box-shadow: 0 0 14px rgba(255,255,255,0.08);
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
    z-index: 2;
  }
  .asteroid.tier-easy { border-color: var(--easy); color: #d3ffe9; }
  .asteroid.tier-medium { border-color: var(--medium); color: #fff3d1; }
  .asteroid.tier-hard { border-color: var(--hard); color: #ffdcdc; }
  .asteroid.locked {
    border-color: #fff !important;
    box-shadow: 0 0 24px #fff, 0 0 40px var(--accent);
  }
  .asteroid .matched { color: #fff; text-shadow: 0 0 8px var(--accent); }
  .asteroid .remaining { opacity: 0.55; }

  .asteroid.dying {
    animation: dieOut 0.28s ease forwards;
  }
  @keyframes dieOut {
    to { transform: scale(1.6); opacity: 0; }
  }

  .particle {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); z-index: 3; pointer-events: none;
  }

  #ship {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-size: 40px; z-index: 2; filter: drop-shadow(0 0 12px var(--accent));
  }

  #groundLine {
    position: absolute; bottom: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, transparent, var(--danger), transparent);
    opacity: 0.5; z-index: 2;
  }

  .shake { animation: shake 0.35s ease; }
  @keyframes shake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-8px, 4px); }
    40% { transform: translate(8px, -4px); }
    60% { transform: translate(-6px, -2px); }
    80% { transform: translate(6px, 2px); }
  }

  #typedPreview {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    font-size: 16px; color: var(--accent); min-height: 22px; letter-spacing: 2px;
    z-index: 5; text-shadow: 0 0 8px var(--accent);
  }

  #levelUpBanner {
    position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%) scale(0.6);
    font-size: 34px; font-weight: 800; color: #fff; letter-spacing: 3px;
    text-shadow: 0 0 20px var(--accent2), 0 0 50px var(--accent);
    opacity: 0; z-index: 7; pointer-events: none;
  }
  #levelUpBanner.show {
    animation: levelPop 1s ease forwards;
  }
  @keyframes levelPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    35% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  #muteBtn {
    position: absolute; top: 72px; right: 24px; z-index: 6;
    background: var(--panel); border: 1px solid rgba(79,216,255,0.25); color: #eaf6ff;
    border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 16px;
  }
</style>
</head>
<body>

<div id="starfield"></div>

<div id="app">

  <!-- START SCREEN -->
  <div id="startScreen" class="screen">
    <div class="panel">
      <h1 class="title">☄ ASTEROID TYPER</h1>
      <p class="subtitle">Pick a topic, then type the falling words before they crash into your ship.</p>
      <div class="pack-section-title">Free Packs</div>
      <div class="pack-grid" id="freePackGrid"></div>
      <div class="pack-section-title">Premium Packs <span class="premium-flag">🔒 Subscription</span></div>
      <div class="pack-grid" id="premiumPackGrid"></div>
      <button class="big-btn" id="startBtn">LAUNCH</button>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameOverScreen" class="screen hidden">
    <div class="panel">
      <h1 class="title" style="color:var(--danger); text-shadow:0 0 12px var(--danger)">SHIP DESTROYED</h1>
      <div class="stats-final">
        <div><span class="val" id="finalScore">0</span><span class="lbl">Score</span></div>
        <div><span class="val" id="finalWpm">0</span><span class="lbl">WPM</span></div>
        <div><span class="val" id="finalAcc">0%</span><span class="lbl">Accuracy</span></div>
        <div><span class="val" id="finalLevel">1</span><span class="lbl">Level Reached</span></div>
      </div>
      <button class="big-btn" id="retryBtn">PLAY AGAIN</button>
    </div>
  </div>

  <!-- GAME FIELD -->
  <div id="gameScreen" class="hidden">
    <button id="muteBtn">🔊</button>
    <div id="hud">
      <div class="hud-block">
        <div class="hud-item"><span class="num" id="hudScore">0</span><span class="lab">SCORE</span></div>
        <div class="hud-item"><span class="num" id="hudWpm">0</span><span class="lab">WPM</span></div>
        <div class="hud-item"><span class="num" id="hudAcc">100%</span><span class="lab">ACC</span></div>
        <div class="hud-item"><span class="num" id="hudLevel">1</span><span class="lab">LVL</span></div>
      </div>
      <div class="hud-block">
        <div id="lives"></div>
      </div>
    </div>
    <div id="combo-display"></div>
    <div id="levelUpBanner"></div>
    <div id="gameField"></div>
    <div id="typedPreview"></div>
    <div id="ship">🚀</div>
    <div id="groundLine"></div>
  </div>

</div>

<input id="hiddenInput" autocomplete="off" autocapitalize="off" spellcheck="false"
  style="position:absolute; opacity:0; pointer-events:none; top:-100px;">
<div id="lockToast"></div>

  const BASE_FALL_SPEED = 1.0;   // px/frame baseline at 60fps; actual speed also scales with word length + level
  const BASE_SPAWN_MS = 1800;
  const LIVES = 3;

  /* ---------------- Audio (synthesized, no assets) ---------------- */
  let audioCtx = null;
  let muted = false;
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }
  function beep(freq, duration, type, gainVal, delay) {
    if (muted) return;
    const ctx = ensureAudio();
    const t0 = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(gainVal || 0.15, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration);
  }
  const sfx = {
    key: () => beep(700, 0.05, 'square', 0.05),
    destroy: () => { beep(880, 0.12, 'triangle', 0.18); beep(1320, 0.15, 'triangle', 0.12, 0.05); },
    miss: () => beep(180, 0.25, 'sawtooth', 0.15),
    lifeLost: () => { beep(140, 0.35, 'sawtooth', 0.2); beep(90, 0.4, 'sawtooth', 0.18, 0.08); },
    levelUp: () => { beep(523, 0.1, 'sine', 0.15); beep(659, 0.1, 'sine', 0.15, 0.1); beep(784, 0.18, 'sine', 0.18, 0.2); },
    gameOver: () => { beep(300, 0.3, 'sawtooth', 0.2); beep(220, 0.3, 'sawtooth', 0.2, 0.15); beep(140, 0.5, 'sawtooth', 0.2, 0.3); }
  };

  let selectedPackId = null;
  let selectedPack = null;

  function makePackTile(id, pack, locked) {
    const tile = document.createElement('button');
    tile.className = 'pack-tile' + (locked ? ' locked' : '');
    tile.dataset.packId = id;
    tile.innerHTML = '<span class="pack-icon">' + pack.icon + '</span>' +
      '<span class="pack-name">' + pack.name + '</span>' +
      (locked ? '<span class="pack-lock-badge">🔒</span>' : '');
    tile.addEventListener('click', () => {
      if (locked) {
        showLockedMessage(pack.name);
        return;
      }
      selectPack(id, pack);
    });
    return tile;
  }

  function renderPackGrids() {
    Object.entries(PACKS.free).forEach(([id, pack]) => {
      freePackGrid.appendChild(makePackTile(id, pack, false));
    });
    Object.entries(PACKS.premium).forEach(([id, pack]) => {
      premiumPackGrid.appendChild(makePackTile(id, pack, true));
    });
  }

  function selectPack(id, pack) {
    selectedPackId = id;
    selectedPack = pack;
    document.querySelectorAll('.pack-tile').forEach(t => t.classList.remove('selected'));
    const el = freePackGrid.querySelector('[data-pack-id="' + id + '"]');
    if (el) el.classList.add('selected');
  }

  function showLockedMessage(name) {
    lockToast.textContent = '🔒 ' + name + ' is a Premium pack — unlock with a subscription';
    lockToast.classList.add('show');
    clearTimeout(showLockedMessage._t);
    showLockedMessage._t = setTimeout(() => lockToast.classList.remove('show'), 2200);
  }

  renderPackGrids();
  selectPack('animals', PACKS.free.animals);

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  /* ---------------- Game state ---------------- */
  let state = null;

  function makeState(pack) {
    return {
      pack,
      asteroids: [],   // {el, word, x, y, speed, tier, id}
      typed: '',
      score: 0,
      lives: LIVES,
      maxLives: LIVES,
      level: 1,
      combo: 0,
      wordsDestroyed: 0,
      correctKeystrokes: 0,
      totalKeystrokes: 0,
      startTime: performance.now(),
      lastSpawn: 0,
      spawnInterval: BASE_SPAWN_MS,
      running: false,
      rafId: null,
      nextId: 1
    };
  }

  function pickWord(s) {
    const pools = [s.pack.starter, s.pack.explorer, s.pack.champion];
    // higher levels lean toward the harder tier of the chosen pack
    const pool = pools[Math.min(pools.length - 1, Math.floor((s.level - 1) / 3))];
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function tierForWord(pack, word) {
    if (pack.champion.includes(word)) return 'hard';
    if (pack.explorer.includes(word)) return 'medium';
    return 'easy';
  }

  function spawnAsteroid(s) {
    const word = pickWord(s);
    const tier = tierForWord(s.pack, word);
    const el = document.createElement('div');
    el.className = 'asteroid tier-' + tier;
    el.innerHTML = '<span class="remaining">' + word + '</span>';
    gameField.appendChild(el);

    const fieldWidth = gameField.clientWidth;
    const approxWidth = Math.max(80, word.length * 14 + 32);
    const x = Math.random() * Math.max(10, fieldWidth - approxWidth - 20) + 10;
    el.style.left = x + 'px';
    el.style.top = '-40px';

    // shorter words fall slowly (friendly for little kids); longer words
    // fall faster and are worth more points (scoring already scales with length)
    const lengthFactor = 0.6 + word.length * 0.035;
    const levelMultiplier = 1 + (s.level - 1) * 0.15;
    const speed = BASE_FALL_SPEED * lengthFactor * levelMultiplier * (0.9 + Math.random() * 0.2);

    const asteroid = {
      id: s.nextId++,
      el, word, tier,
      x, y: -40,
      speed
    };
    s.asteroids.push(asteroid);
  }

  function renderLives(s) {
    livesEl.innerHTML = '';
    for (let i = 0; i < s.maxLives; i++) {
      const span = document.createElement('span');
      span.className = 'life-icon' + (i < s.lives ? '' : ' lost');
      span.textContent = '🛡';
      livesEl.appendChild(span);
    }
  }

  function updateHud(s) {
    const elapsedMin = Math.max((performance.now() - s.startTime) / 60000, 1 / 60);
    const wpm = Math.round(s.wordsDestroyed / elapsedMin);
    const acc = s.totalKeystrokes === 0 ? 100 : Math.round((s.correctKeystrokes / s.totalKeystrokes) * 100);
    hudScore.textContent = s.score;
    hudWpm.textContent = wpm;
    hudAcc.textContent = acc + '%';
    hudLevel.textContent = s.level;
    return { wpm, acc };
  }

  function findLockedAsteroid(s) {
    if (!s.typed) return null;
    return s.asteroids.find(a => a.word.startsWith(s.typed)) || null;
  }

  function renderAsteroidText(a, s) {
    const locked = s.typed && a.word.startsWith(s.typed);
    a.el.classList.toggle('locked', !!locked);
    if (locked && s.typed.length > 0) {
      const matched = a.word.slice(0, s.typed.length);
      const remaining = a.word.slice(s.typed.length);
      a.el.innerHTML = '<span class="matched">' + matched + '</span><span class="remaining">' + remaining + '</span>';
    } else {
      a.el.innerHTML = '<span class="remaining">' + a.word + '</span>';
    }
  }

  function spawnParticles(x, y, color) {
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      if (color) p.style.background = color;
      gameField.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 50;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const duration = 400 + Math.random() * 200;
      p.animate([
        { transform: 'translate(0,0)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
      ], { duration, easing: 'ease-out' });
      setTimeout(() => p.remove(), duration + 20);
    }
  }

  function destroyAsteroid(s, a, success) {
    const idx = s.asteroids.indexOf(a);
    if (idx === -1) return;
    s.asteroids.splice(idx, 1);
    const rect = a.el.getBoundingClientRect();
    const fieldRect = gameField.getBoundingClientRect();
    const cx = rect.left - fieldRect.left + rect.width / 2;
    const cy = rect.top - fieldRect.top + rect.height / 2;

    if (success) {
      a.el.classList.add('dying');
      spawnParticles(cx, cy, tierColor(a.tier));
      setTimeout(() => a.el.remove(), 300);
    } else {
      a.el.remove();
    }
  }

  function tierColor(tier) {
    return tier === 'hard' ? '#ff5c5c' : tier === 'medium' ? '#ffd35c' : '#57ffb0';
  }

  function showLevelUp(s) {
    levelUpBanner.textContent = 'LEVEL ' + s.level;
    levelUpBanner.classList.remove('show');
    void levelUpBanner.offsetWidth;
    levelUpBanner.classList.add('show');
    sfx.levelUp();
  }

  function maybeLevelUp(s) {
    const targetLevel = Math.floor(s.wordsDestroyed / 8) + 1;
    if (targetLevel > s.level) {
      s.level = targetLevel;
      // fall speed ramps via the per-asteroid levelMultiplier in spawnAsteroid;
      // only the spawn rate needs updating here
      s.spawnInterval = Math.max(500, BASE_SPAWN_MS * Math.pow(0.9, s.level - 1));
      showLevelUp(s);
    }
  }

  function showCombo(s) {
    if (s.combo >= 2) {
      comboDisplay.textContent = s.combo + 'x COMBO';
      comboDisplay.classList.add('show');
      clearTimeout(showCombo._t);
      showCombo._t = setTimeout(() => comboDisplay.classList.remove('show'), 700);
    }
  }

  function handleWordComplete(s, a) {
    const basePoints = a.word.length * 10;
    const comboMult = 1 + Math.min(s.combo, 10) * 0.1;
    s.score += Math.round(basePoints * comboMult);
    s.combo++;
    s.wordsDestroyed++;
    s.typed = '';
    typedPreview.textContent = '';
    destroyAsteroid(s, a, true);
    sfx.destroy();
    showCombo(s);
    maybeLevelUp(s);
  }

  function handleAsteroidLanded(s, a) {
    s.combo = 0;
    s.lives--;
    destroyAsteroid(s, a, false);
    sfx.lifeLost();
    renderLives(s);
    app.classList.add('shake');
    setTimeout(() => app.classList.remove('shake'), 350);
    if (s.lives <= 0) {
      endGame(s);
    }
  }

  /* ---------------- Input handling ---------------- */
  function onKeyDown(e) {
    if (!state || !state.running) return;
    if (e.key === 'Backspace') {
      if (state.typed.length > 0) {
        state.typed = state.typed.slice(0, -1);
        typedPreview.textContent = state.typed;
        refreshAsteroidRendering();
      }
      e.preventDefault();
      return;
    }
    if (e.key.length !== 1) return; // ignore non-character keys
    if (!/^[a-zA-Z]$/.test(e.key)) return;

    const s = state;
    const candidateTyped = s.typed + e.key.toLowerCase();
    s.totalKeystrokes++;

    const matchExists = s.asteroids.some(a => a.word.startsWith(candidateTyped));
    if (matchExists) {
      s.correctKeystrokes++;
      s.typed = candidateTyped;
      typedPreview.textContent = s.typed;
      sfx.key();
      const exact = s.asteroids.find(a => a.word === s.typed);
      if (exact) {
        handleWordComplete(s, exact);
      } else {
        refreshAsteroidRendering();
      }
    } else {
      // wrong key: flash miss, reset typed buffer, break combo
      sfx.miss();
      s.combo = 0;
      s.typed = '';
      typedPreview.textContent = '';
      refreshAsteroidRendering();
    }
  }

  function refreshAsteroidRendering() {
    if (!state) return;
    state.asteroids.forEach(a => renderAsteroidText(a, state));
  }

  document.addEventListener('keydown', onKeyDown);
  // keep hidden input focused so mobile keyboards can appear
  function focusHiddenInput() {
    hiddenInput.value = '';
    hiddenInput.focus({ preventScroll: true });
  }

  /* ---------------- Main loop ---------------- */
  function tick(ts) {
    const s = state;
    if (!s || !s.running) return;

    if (!s.lastSpawn) s.lastSpawn = ts;
    if (!s.lastTick) s.lastTick = ts;
    const dt = Math.min(ts - s.lastTick, 100); // clamp to avoid huge jumps after tab throttling
    s.lastTick = ts;
    const frames = dt / (1000 / 60); // normalize speed to a 60fps baseline regardless of actual frame rate

    if (ts - s.lastSpawn > s.spawnInterval) {
      spawnAsteroid(s);
      s.lastSpawn = ts;
    }

    const fieldHeight = gameField.clientHeight;
    const groundY = fieldHeight - 30;

    for (let i = s.asteroids.length - 1; i >= 0; i--) {
      const a = s.asteroids[i];
      a.y += a.speed * frames;
      a.el.style.top = a.y + 'px';
      if (a.y >= groundY) {
        handleAsteroidLanded(s, a);
      }
    }

    updateHud(s);
    s.rafId = requestAnimationFrame(tick);
  }

  /* ---------------- Screen management ---------------- */
  function showScreen(el) {
    [startScreen, gameOverScreen, gameScreen].forEach(sc => sc.classList.add('hidden'));
    el.classList.remove('hidden');
  }

  function startGame() {
    if (!selectedPack) return;
    ensureAudio();
    if (state && state.rafId) cancelAnimationFrame(state.rafId);
    gameField.innerHTML = '';
    typedPreview.textContent = '';
    comboDisplay.classList.remove('show');
    levelUpBanner.classList.remove('show');

    state = makeState(selectedPack);
    state.running = true;
    renderLives(state);
    updateHud(state);
    showScreen(gameScreen);
    focusHiddenInput();
    state.rafId = requestAnimationFrame(tick);
  }

  function endGame(s) {
    s.running = false;
    if (s.rafId) cancelAnimationFrame(s.rafId);
    sfx.gameOver();
    const { wpm, acc } = updateHud(s);
    document.getElementById('finalScore').textContent = s.score;
    document.getElementById('finalWpm').textContent = wpm;
    document.getElementById('finalAcc').textContent = acc + '%';
    document.getElementById('finalLevel').textContent = s.level;
    showScreen(gameOverScreen);
  }

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', () => showScreen(startScreen));

  gameScreen.addEventListener('click', focusHiddenInput);

  showScreen(startScreen);
})();
</script>
</body>
</html>
